<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByDesign</title>
    <!-- Incluyendo las nuevas fuentes desde Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Exo+2:wght@700&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        /* --- Estilos para el reproductor --- */
        :root {
            --glow-color: #ff6700; /* Naranja fuego principal */
            --fire-yellow: #ffd000;
            --fire-orange: #ff8c00;
        }

        @keyframes neon-glow-text {
            0%, 100% {
                text-shadow: 0 0 3px #fff, 0 0 6px var(--fire-yellow), 0 0 9px var(--glow-color);
            }
            50% {
                text-shadow: 0 0 4px #fff, 0 0 8px var(--fire-orange), 0 0 12px var(--glow-color);
            }
        }

        @keyframes bass-effect {
            0%, 100% {
                transform: translateY(0) scale(1);
                filter: drop-shadow(0 2px 3px rgba(0,0,0,0.7));
            }
            50% {
                transform: translateY(-2px) scale(1.02);
                filter: drop-shadow(0 4px 8px rgba(0,0,0,0.9));
            }
        }
        
        @keyframes fire-pulse-text {
            0%, 100% { text-shadow: 0 0 4px var(--fire-orange); }
            50% { text-shadow: 0 0 8px var(--fire-yellow); }
        }

        body {
            background-color: transparent;
            margin: 0;
            overflow: hidden;
            font-family: 'Exo 2', sans-serif;
            font-weight: 700;
        }

        .player-container {
            width: 630px;
            height: 360px;
            background: url(https://xatimg.com/image/QIPO90KLBOSt.png) no-repeat center center;
            background-size: cover;
            position: relative;
            overflow: hidden;
            color: white;
            transition: background-color 0.3s ease;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }
        
        /* Estilos para modo transparente */
        .player-container.transparent-bg {
            background-image: none !important;
            background-color: transparent !important;
        }
        .player-container.transparent-bg .overlay {
            background: transparent !important;
        }


        .player-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #sonic_art {
            position: absolute;
            top: 30px; /* Alineado con fecha y hora */
            left: 40px; 
            width: 85px; /* Más pequeño */
            height: 85px; /* Más pequeño */
            border-radius: 10px;
            transition: background-image 0.5s ease-in-out;
            overflow: hidden;
            border: none;
            box-shadow: none;
            background-color: transparent;
        }
        
        #sonic_art > img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        @keyframes color-swipe {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        .track-info-container {
            position: absolute;
            left: 140px;
            right: 140px;
            top: 30px; /* Alineado con fecha y hora */
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden; 
            text-transform: uppercase;
            text-shadow: none;
        }
        
        #sonic_title {
            font-family: 'Anton', sans-serif;
            font-size: 2.3em; /* Más pequeña */
            white-space: normal; /* Permite el salto de línea */
            line-height: 1.1;
            max-height: 100%;
            background: linear-gradient(90deg, #ff6700, #ffd000 30%, #ffffff 50%, #ffd000 70%, #ff6700);
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: color-swipe 6s linear infinite, bass-effect 0.4s ease-in-out infinite;
        }
        
        .playback-controls {
            position: absolute;
            bottom: 25px; /* Alineado con los otros controles */
            left: 58%;   /* Movido más a la derecha */
            transform: translateX(-50%);
            z-index: 12;
        }

        .player-control-btn {
            width: 60px; 
            height: 60px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background-color: rgba(255, 150, 0, 5);
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .player-control-btn:hover {
            background-color: rgba(255, 103, 0, 0.8);
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--glow-color);
        }
        .player-control-btn svg {
            width: 32px;
            height: 32px;
            fill: white;
            transition: all 0.3s ease;
        }

        .bottom-left-controls {
            position: absolute;
            bottom: 25px;
            left: 30px;
            display: flex; align-items: center; gap: 15px;
            z-index: 11;
        }

        .listeners-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            font-family: 'Russo One', sans-serif;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            border: 2px solid var(--glow-color);
            padding: 8px 15px;
            gap: 10px;
        }

        .listeners-icon {
            width: 24px;
            height: 24px;
            fill: var(--glow-color);
        }
        
        .listeners-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            text-align: left;
        }
        
        #sonic_listeners {
            font-size: 18px;
            color: #fff;
            line-height: 1;
        }
        .listeners-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--glow-color);
        }

        #history-btn {
            font-family: 'Russo One', sans-serif;
            background: linear-gradient(45deg, var(--glow-color), var(--fire-orange));
            border: none;
            color: #000;
            padding: 8px 15px;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 103, 0, 0.4);
        }
        #history-btn:hover {
            box-shadow: 0 6px 20px rgba(255, 103, 0, 0.6);
            transform: translateY(-3px);
        }
        
        .side-panel {
            position: absolute;
            top: 0;
            width: 280px; height: 100%;
            background: radial-gradient(circle at top left, rgba(20, 8, 0, 0.98), rgba(10, 5, 0, 0.98));
            backdrop-filter: blur(8px);
            z-index: 100; padding: 20px; box-sizing: border-box;
            box-shadow: 5px 0 25px -5px rgba(255, 103, 0, 0.5);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1), opacity 0.4s ease;
            pointer-events: none;
        }

        .side-panel.history-panel {
            left: 0;
            border-right: 2px solid var(--glow-color);
            transform: translateX(-100%);
        }

        .side-panel.show {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }
        
        .side-panel h3 {
            margin: 0 0 20px 0; text-align: center;
            font-weight: 700; letter-spacing: 1px;
            color: var(--glow-color);
            animation: neon-glow-text 2s ease-in-out infinite;
        }

        .panel-content-area {
            height: calc(100% - 70px);
            overflow-y: auto;
            padding-right: 5px;
        }
       
        #sonic_history div {
            background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 103, 0, 0.2);
            backdrop-filter: blur(2px); padding: 12px; margin-bottom: 10px;
            border-radius: 6px; font-size: 14px; color: #eee;
            text-shadow: 0 0 4px rgba(255, 103, 0, 0.7);
            transition: all 0.3s ease; display: flex; align-items: center; gap: 10px;
        }

        #sonic_history div:hover {
            background: rgba(255, 103, 0, 0.2); transform: translateX(5px);
            border-color: rgba(255, 103, 0, 0.5); box-shadow: 0 0 15px rgba(255, 103, 0, 0.4);
        }

        #sonic_history div::before {
            content: '♫'; font-size: 16px; color: var(--glow-color);
            text-shadow: 0 0 5px var(--glow-color);
        }
        
        .panel-content-area::-webkit-scrollbar { width: 6px; }
        .panel-content-area::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
        .panel-content-area::-webkit-scrollbar-thumb { background: var(--glow-color); border-radius: 3px; }
        .panel-content-area::-webkit-scrollbar-thumb:hover { background: var(--fire-orange); }

        .close-panel-btn {
            position: absolute;
            top: 15px; background: transparent; border: none;
            color: var(--glow-color); font-size: 28px; cursor: pointer;
            text-shadow: 0 0 5px var(--glow-color);
            transition: transform 0.3s ease;
        }
        #close-history-btn { right: 15px; }
        
        .close-panel-btn:hover {
            transform: scale(1.2) rotate(90deg);
        }

        .controls-container {
            position: absolute;
            bottom: 30px; right: 30px; display: flex;
            align-items: center; gap: 8px;
            z-index: 11;
        }
        
        .top-right-controls {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }
        
        #toggle-bg-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--glow-color);
            background: rgba(0,0,0,0.4);
            color: var(--glow-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.3s ease;
        }
        #toggle-bg-btn:hover {
            background: var(--glow-color);
            color: #000;
        }
        #toggle-bg-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .volume-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 1px solid var(--glow-color);
            background: rgba(0,0,0,0.4);
            color: var(--glow-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s ease;
        }
        .volume-btn:hover {
            background: var(--glow-color);
            color: #000;
        }

        .date-time-container {
            position: relative;
            width: auto;
            font-size: 18px;
            text-align: right;
            animation: fire-pulse-text 3s ease-in-out infinite;
        }
        
        .hidden { display: none !important; }
        
        .custom-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            padding: 15px 25px;
            background: rgba(10, 5, 0, 0.95);
            border: 2px solid var(--glow-color);
            border-radius: 10px;
            color: #fff;
            font-size: 1.1em;
            text-shadow: 0 0 8px var(--glow-color);
            box-shadow: 0 0 20px rgba(255, 103, 0, 0.7);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }

        .custom-alert.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

    </style>
</head>
<body>

    <div class="player-container">
        <div class="overlay"></div>
        <div class="player-content">
            <div id="sonic_art"></div> 
            
            <div class="top-right-controls">
                <div class="date-time-container">
                    <div id="date"></div>
                    <div id="clock"></div>
                </div>
            </div>

            <div class="track-info-container">
                <div id="sonic_title">Încărcare...</div>
            </div>

            <div class="playback-controls">
                <button id="play-pause-btn" class="player-control-btn">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M7 6v12l10-6z"/></svg>
                    <svg id="pause-icon" class="hidden" viewBox="0 0 24 24"><path d="M6 18h4V6H6v12zm8-12v12h4V6h-4z"/></svg>
                </button>
            </div>
            
            <div class="bottom-left-controls">
                <div class="listeners-container">
                    <svg class="listeners-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 1a9 9 0 0 0-9 9v7c0 1.66 1.34 3 3 3h1v-4h-2V10a7 7 0 0 1 7-7 7 7 0 0 1 7 7v6h-2v4h1c1.66 0 3-1.34 3-3v-7a9 9 0 0 0-9-9z"></path></svg>
                    <div class="listeners-text">
                        <span id="sonic_listeners">...</span>
                        <span class="listeners-label">Live</span>
                    </div>
                </div>
                <button id="history-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"></path></svg>
                    <span>Istoric</span>
                </button>
            </div>
            
            <div class="controls-container">
                <button id="toggle-bg-btn" title="Activar/Desactivar Fondo">
                    <svg id="bg-on-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"></path></svg>
                    <svg id="bg-off-icon" class="hidden" viewBox="0 0 24 24"><path fill="currentColor" d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"></path></svg>
                </button>
                <button id="volume-down-btn" class="volume-btn">-</button>
                <button id="volume-up-btn" class="volume-btn">+</button>
            </div>

            <audio id="audio-player" class="hidden"></audio>
        </div>

        <div id="history-panel" class="side-panel history-panel">
            <button id="close-history-btn" class="close-panel-btn">&times;</button>
            <h3>Istoric</h3>
            <div id="sonic_history" class="panel-content-area"></div>
        </div>
        
        <div id="custom-alert" class="custom-alert">Stop Copyright ByDesign</div>

    </div>

    <script>
        // --- Radio Configuration (Protected) ---
        const radioConfig = {
    port: 10922,
    url: "https://radio.sonicpanel.ro:10922/stream",
    defaultAlbumArt: "https://xatimg.com/image/4cG29zd0PcbC.png"
};
        // ---------------------------------

        const audioPlayer = document.getElementById('audio-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const sonicArt = document.getElementById('sonic_art');
        const volumeUpBtn = document.getElementById('volume-up-btn');
        const volumeDownBtn = document.getElementById('volume-down-btn');
        
        const historyBtn = document.getElementById('history-btn');
        const historyPanel = document.getElementById('history-panel');
        const closeHistoryBtn = document.getElementById('close-history-btn');

        const toggleBgBtn = document.getElementById('toggle-bg-btn');
        const playerContainer = document.querySelector('.player-container');
        const bgOnIcon = document.getElementById('bg-on-icon');
        const bgOffIcon = document.getElementById('bg-off-icon');

        let currentTrackTitle = '';
        
        audioPlayer.volume = 0.75; // Initial volume

        async function updateRadioInfo() {
            try {
                const radioApiUrl = `https://technoplayerserver.net/cp/get_info.php?p=${radioConfig.port}&_=${Date.now()}`;
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(radioApiUrl)}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) { return; }
                
                const data = await response.json();
                
                const songTitle = data.song || data.title || '';
                if (songTitle && songTitle !== currentTrackTitle) {
                    currentTrackTitle = songTitle;
                    
                    document.getElementById('sonic_title').textContent = songTitle;

                    const sonicArtImgContainer = document.getElementById('sonic_art');
                    let img = sonicArtImgContainer.querySelector('img');
                    if (!img) {
                        sonicArtImgContainer.innerHTML = '';
                        img = document.createElement('img');
                        sonicArtImgContainer.appendChild(img);
                    }
                    img.src = data.art ? data.art : radioConfig.defaultAlbumArt;
                }
                
                if(data.listeners) {
                    document.getElementById('sonic_listeners').textContent = data.listeners;
                }
                
            } catch (error) {
                console.error("Error fetching radio info:", error);
            }
        }

        function togglePlay() {
            // Check if player is currently playing
            if (audioPlayer.duration > 0 && !audioPlayer.paused) {
                // If playing, detach from the stream to stop buffering
                audioPlayer.pause();
                audioPlayer.src = '';
            } else {
                // If paused or stopped, set the source and play
                audioPlayer.src = `${radioConfig.url}/;type=mp3`;
                audioPlayer.play().catch(e => console.error("Error attempting to play audio:", e));
            }
        }
        
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            clockEl.textContent = `${hours}:${minutes}`;
        }

        function updateDate() {
            const now = new Date();
            const weekDays = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];
            dateEl.textContent = `${weekDays[now.getDay()]} ${now.getDate()}/${now.getMonth() + 1}`;
        }
        
        playPauseBtn.addEventListener('click', togglePlay);

        volumeUpBtn.addEventListener('click', () => {
            let newVolume = audioPlayer.volume + 0.1;
            if (newVolume > 1) newVolume = 1;
            audioPlayer.volume = newVolume;
        });

        volumeDownBtn.addEventListener('click', () => {
            let newVolume = audioPlayer.volume - 0.1;
            if (newVolume < 0) newVolume = 0;
            audioPlayer.volume = newVolume;
        });

        toggleBgBtn.addEventListener('click', () => {
            playerContainer.classList.toggle('transparent-bg');
            const isTransparent = playerContainer.classList.contains('transparent-bg');
            bgOnIcon.classList.toggle('hidden', isTransparent);
            bgOffIcon.classList.toggle('hidden', !isTransparent);
        });
        
        audioPlayer.addEventListener('play', () => {
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
        });

        audioPlayer.addEventListener('pause', () => {
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
        });

        historyBtn.addEventListener('click', () => historyPanel.classList.add('show'));
        closeHistoryBtn.addEventListener('click', () => historyPanel.classList.remove('show'));
        
        // --- Security Measures ---
        const customAlert = document.getElementById('custom-alert');

        document.addEventListener('contextmenu', event => {
            event.preventDefault();
            if (customAlert) {
                customAlert.classList.add('show');
                setTimeout(() => {
                    customAlert.classList.remove('show');
                }, 2500);
            }
        });

        document.addEventListener('keydown', function(event) {
            if (event.key === 'F12' || (event.ctrlKey && event.shiftKey && event.key === 'I') || (event.ctrlKey && event.key === 'u')) {
                event.preventDefault();
            }
        });

        updateClock();
        updateDate();
        setInterval(updateClock, 1000);
        
        updateRadioInfo();
        setInterval(updateRadioInfo, 7000);
    </script>
    
    <script id='sonic_js' data-port='8132' src='https://radio.sonicpanel.ro/cp/widgets.js?r=667'></script>

</body>
</html>
