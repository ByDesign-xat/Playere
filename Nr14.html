<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>ByDesign</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        #xat-frame { 
            width: 950px; height: 750px; margin: 0 auto; position: relative; overflow: hidden; 
            background: #000 url('https://xatimg.com/image/nGqzqftXNfpX.png') no-repeat center center; 
            background-size: 100% 100%; border: 1px solid #444; font-family: Arial, sans-serif; color: white; 
        }
        .header-wix { height: 220px; background: transparent; position: relative; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid #50b4ff; z-index: 999; }
        .logo-text-container { display: flex; justify-content: center; align-items: center; width: 100%; padding-top: 20px; gap: 30px; }
        .logo-custom { font-family: 'Arial Black', Gadget, sans-serif; font-size: 42px; color: #33ccff; text-transform: uppercase; text-align: center; line-height: 0.9; text-shadow: 3px 3px 10px #000; }
        .cas-img { width: 110px; height: auto; filter: drop-shadow(0 0 10px #000); }
        .nav-wix-list { list-style: none; padding: 0; margin: auto 0 5px 0; display: flex; justify-content: center; border-bottom: 2px solid #ff0000; }
        .nav-wix-list li { position: relative; }
        .nav-wix-list a { text-decoration: none; color: white; font-size: 13px; font-weight: bold; padding: 0 20px; display: block; height: 30px; line-height: 30px; text-shadow: 1px 1px 2px #000; }
        .dropdown-domini { display: none; position: absolute; top: 30px; left: 0; background: rgba(0, 0, 0, 0.95); border: 1px solid #ff0000; width: 210px; z-index: 1000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        .dropdown-domini a { font-size: 11px; color: #00f2ff; padding: 10px; border-bottom: 1px solid #333; height: auto; line-height: normal; }
        .dropdown-domini a:hover { background: #ff0000; color: #fff; }
        .nav-wix-list li:hover .dropdown-domini { display: block; }
        .grid-main { display: grid; grid-template-columns: 210px 1fr 210px; gap: 10px; padding: 10px; height: 480px; position: relative; z-index: 10; }
        .side-bar { display: flex; flex-direction: column; gap: 8px; }
        .tag-red { background: red; color: white; font-size: 10px; text-align: center; font-style: italic; padding: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .song-box { border: 1px solid #00f2ff; background: rgba(0, 30, 60, 0.7); color: #fff; font-size: 10px; font-weight: bold; padding: 12px; min-height: 40px; display: flex; align-items: center; overflow: hidden; }
        .player-unit { display: flex; flex-direction: column; align-items: center; position: relative; }
        .player-inner { background: rgba(0,0,0,0.8); border: 4px solid #111; display: flex; padding: 10px; width: 440px; border-radius: 8px; z-index: 15; }
        #vinyl-record {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid #333;
    background-image: url('https://xatimg.com/image/oacvd5ltA14X.png');
    background-size: cover;
    background-position: center;
    animation: spin 8s linear infinite;
    animation-play-state: paused;
}
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .ballerini-area { width: 440px; height: 240px; margin-top: 10px; border: 2px solid #00f2ff; border-radius: 8px; background: rgba(0,0,0,0.5); overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .ballerini-content { width: 100%; height: 100%; object-fit: contain; }
        .digital-box { background: rgba(0, 0, 0, 0.7); border: 1px solid #00f2ff; padding: 15px; text-align: center; border-radius: 5px; margin-top: auto; }
        .digital-value { font-family: 'Courier New', monospace; font-size: 20px; color: #00f2ff; font-weight: bold; }
        .footer-xat { position: absolute; bottom: 0; width: 950px; height: 35px; background: rgba(0,0,0,0.8); border-top: 1px solid #00f2ff; display: flex; justify-content: center; align-items: center; z-index: 20; }
        .footer-content { color:white; font-size: 14px; font-weight: bold; display: flex; gap: 30px; align-items: center; }
        .online-tag { color: #0f0; font-size: 12px; background: rgba(0,255,0,0.1); padding: 3px 10px; border-radius: 12px; border: 1px solid #0f0; text-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>

<div id="xat-frame">
    <div class="header-wix">
        <div class="logo-text-container">
            <img src="https://static.wixstatic.com/media/2a2862_371665231c194fa69edd2a5290d4aff2~mv2.png" class="cas-img">
            <div class="logo-custom">Radio<br>LaFamilia</div>
            <img src="https://static.wixstatic.com/media/2a2862_bad449727a3c4c12896982647dcf8873~mv2.png" class="cas-img">
        </div>
        <ul class="nav-wix-list">
            <li><a href="https://uxat.eu/Chat" target="_blank" style="color:#0f0;">Chat LIVE</a></li>
            <li><a href="https://radio.sonicpanel.ro/8132/stream" target="_blank" style="color:#00f2ff;">Asculta LIVE</a></li>
            <li>
                <a href="#" style="color:red">Login</a>
                <div class="dropdown-domini">
                    <a href="https://radio.sonicpanel.ro:2087" target="_blank">Login Panel</a>
                    <a href="https://dedicatiipanel.ro/dj/login" target="_blank">Login Dedicatii</a>
                    <a href="https://xat.me/xDesignx" target="_blank">ByDesign</a>
                </div>
            </li>
        </ul>
    </div>

    <div class="grid-main">
        <div class="side-bar">
            <div class="tag-red">Arhiva</div>
            <div id="queue-list"></div>
            <div class="digital-box"><div id="date-box" class="digital-value">--/--/--</div></div>
        </div>

        <div class="player-unit">
            <div style="color: #00f2ff; font-family: cursive; font-size: 14px; margin-bottom: 2px; text-shadow: 1px 1px 2px #000;">Acum LIVE</div>
            <div class="player-inner">
                <div id="vinyl-record"></div>
                <div style="flex:1; padding-left:12px; text-align:left;">
                    <div id="track-title" style="color:#00f2ff; font-weight:bold; font-size:13px; min-height:45px; line-height:1.3;">Încărcare...</div>
                    <div style="margin-top:10px; display: flex; align-items: center; gap: 10px;">
                    <button id="btn-play" style="background:#00ff06; color:white; border:none; padding:6px 12px; cursor:pointer; font-weight:bold; border-radius:3px;">Play</button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" style="width:100px;">
                    </div>

                   <div style="margin-top:19px; text-align:70px;">
                        <span class="online-tag">
                           ONLINE: <span id="listeners-count">0</span>
                   </span>
                 </div>
                </div>
            </div>
            <div class="ballerini-area">
                <img src="https://xatimg.com/image/eQclCkaKDJdZ.gif" class="ballerini-content">
            </div>
        </div>

        <div class="side-bar">
            <div class="tag-red">Istoric</div>
            <div id="history-list"></div>
            <div class="digital-box"><div id="time-box" class="digital-value"></div></div>
        </div>
    </div>

    <div class="footer-xat">
        <div class="footer-content">
            <span>Radio LaFamilia  &copy; Copyright - ByDesign</span>
        </div>
    </div>
</div>

<script>
const _0xMOR = "https://radio.sonicpanel.ro:10922/radio.mp3";
const _stream = new Audio(_0xMOR);

let historySongs = [];
let lastSong = "";

// Protectie stream
function checkV() {
    if (_stream.src !== _0xMOR) {
        _stream.pause();
        document.body.innerHTML = "";
    }
}

// Elemente
const playBtn = document.getElementById('btn-play');
const vinyl = document.getElementById('vinyl-record');
const vol = document.getElementById('volume-slider');

// Volum
vol.oninput = (e) => {
    _stream.volume = e.target.value;
};

// Play / Stop
playBtn.onclick = () => {
    checkV();
    if (_stream.paused) {
        _stream.play();
        playBtn.innerText = "STOP";
        playBtn.style.background = "red";
        vinyl.style.animationPlayState = "running";
    } else {
        _stream.pause();
        playBtn.innerText = "Play";
        playBtn.style.background = "#00ff06";
        vinyl.style.animationPlayState = "paused";
    }
};

// Clock
function updateClock(){
    const d = new Date();
    document.getElementById("time-box").innerText =
        d.toLocaleTimeString();

    document.getElementById("date-box").innerText =
        d.toLocaleDateString('it-IT', {
            day:'2-digit',
            month:'short',
            year:'numeric'
        }).toUpperCase();

    setTimeout(updateClock, 1000);
}

// Sync SHOUTcast
async function syncData() {
    try {
        const r = await fetch('https://radio.sonicpanel.ro:10922/stats?json=1');
        if (!r.ok) throw new Error("Network error");

        const d = await r.json();

        const currentSong = d.songtitle || "LIVE ON AIR";

        // Titlu curent
        document.getElementById('track-title').innerText = currentSong;
		updateArtwork(currentSong);

        // Ascultatori
        document.getElementById('listeners-count').innerText =
            d.currentlisteners || 0;

        // Istoric automat
        if (currentSong !== lastSong && lastSong !== "") {
            historySongs.unshift(lastSong);
            if (historySongs.length > 5) historySongs.pop();
        }

        lastSong = currentSong;

        // In Arrivo (nu exista real la SHOUTcast)
        document.getElementById('queue-list').innerHTML =
            `<div class="song-box">Next Song Soon...</div>`;

        // Ascoltati
        let h = "";
        historySongs.forEach(song => {
            h += `<div class="song-box">${song}</div>`;
        });

        document.getElementById('history-list').innerHTML = h;

    } catch (e) {
        console.error("Eroare SHOUTcast:", e);
        document.getElementById('track-title').innerText = "LIVE ON AIR";
    }
}

// Init coperta automata
document.addEventListener("DOMContentLoaded", function(){
    updateClock();
    syncData();
    setInterval(syncData, 15000);
    setInterval(checkV, 5000);
});
async function updateArtwork(songTitle) {
    try {
        const query = encodeURIComponent(songTitle);
        const response = await fetch(
            `https://itunes.apple.com/search?term=${query}&entity=song&limit=1`
        );

        const data = await response.json();

        if (data.results.length > 0) {
            const art = data.results[0].artworkUrl100.replace("100x100", "500x500");
            vinyl.style.backgroundImage = `url('${art}')`;
        }
    } catch {}
}
// --- PROTECT SCRIPT ---
const protectionMessage="Stop Copyright ByDesign";
document.addEventListener("contextmenu", e=>{e.preventDefault();alert(protectionMessage);});
document.addEventListener("selectstart", e=>{e.preventDefault();});
document.addEventListener("keydown", e=>{e.preventDefault();alert(protectionMessage);});
document.addEventListener("keyup", e=>{e.preventDefault();alert(protectionMessage);});
document.addEventListener("dragstart", e=>{e.preventDefault();});
document.addEventListener("copy", e=>{e.preventDefault();alert(protectionMessage);});
document.addEventListener("mousedown", e=>{if(e.button===1||e.button===2){e.preventDefault();alert(protectionMessage);}});
document.addEventListener("keydown", function(e) {

    // Ctrl + U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
    }

    // Ctrl + Shift + I (DevTools)
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
    }

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

});
</script>
</body>
</html>
