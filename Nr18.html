<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>ByDesign</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

:root{
--glow:#ff0000;
}

body{
background:#000;
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Orbitron;
color:white;
}

.player{

width:750px;
background:#0a0000;
border:3px solid var(--glow);
box-shadow:0 0 25px var(--glow);
padding:25px;
text-align:center;
perspective: 800px;

}

.cover{

width:200px;
height:200px;
border-radius:50%;
border:6px solid var(--glow);
margin:auto;
overflow:hidden;
box-shadow:0 0 20px var(--glow);

}

.cover img{

width:100%;
height:100%;
object-fit:cover;

}

.eq{

display:flex;
justify-content:center;
gap:4px;
margin:20px;

}

.bar{
width:6px;
height:15px;
background:var(--glow);
animation:eq 0.6s infinite alternate;
opacity:1;
}

@keyframes eq{

from{height:10px}
to{height:60px}

}

button{

background:#000;
border:2px solid var(--glow);
color:white;
padding:10px 30px;
font-family:Orbitron;
cursor:pointer;

}

button:hover{

background:var(--glow);
color:black;

}

input[type=range]{

width:200px;

}

.marquee{

margin-top:20px;
font-size:18px;
border-top:2px solid var(--glow);
padding-top:10px;

}

.cityline{

margin-top:20px;
font-size:12px;
color:yellow;

}
.scroll-box{
margin-top:10px;
border:2px solid var(--glow);
box-shadow:0 0 10px var(--glow);
background:#050000;
height:40px;
display:flex;
align-items:center;
overflow:hidden;
position:relative;
}

.scroll-text{
white-space:nowrap;
position:absolute;
animation:scrollText 20s linear infinite;
font-size:14px;
font-weight:900;
padding-left:100%;
}

@keyframes scrollText{
from{transform:translateX(0)}
to{transform:translateX(-100%)}
}
.chroma-dots{
display:flex;
justify-content:center;
gap:16px;
margin-top:15px;
cursor:pointer;
transition:0.3s;
}

.chroma-dot:hover{
transform:scale(1.6);
filter:brightness(1.4);
box-shadow:0 0 15px currentColor,0 0 30px currentColor,0 0 45px currentColor;
}

.chroma-dot{
width:20px;
height:20px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.chroma-dot span{
width:100%;
height:100%;
border-radius:50%;
background:var(--main);
animation:dotPulse 1.5s infinite alternate;
transition:0.3s;
}

/* HOVER EFFECT */
.chroma-dot:hover span{
transform:scale(1.6);
filter:brightness(1.4);
box-shadow:0 0 15px currentColor,0 0 30px currentColor,0 0 45px currentColor;
}

.chroma-dot:nth-child(1) span{background:#ff0000;}
.chroma-dot:nth-child(2) span{background:#ff7b00;}
.chroma-dot:nth-child(3) span{background:#ffee00;}
.chroma-dot:nth-child(4) span{background:#00ff00;}
.chroma-dot:nth-child(5) span{background:#00ffff;}
.chroma-dot:nth-child(6) span{background:#0066ff;}
.chroma-dot:nth-child(7) span{background:#8a2be2;}
.chroma-dot:nth-child(8) span{background:#ff00ff;}
.chroma-dot:nth-child(9) span{background:#ffffff;}

@keyframes dotPulse{

0%{
transform:scale(1);
box-shadow:0 0 0 var(--main);
}

100%{
transform:scale(1.6);
box-shadow:0 0 10px var(--main), 0 0 25px var(--main);
}

}

.history-btn{
margin-top:20px;
position:relative;
}

.history-panel{
position:absolute;
bottom:44px;
left:110px;
width:70%;
max-height:0;
overflow:hidden;
background:#050000;
border:2px solid var(--glow);
box-shadow:0 0 10px var(--glow);
display:flex;
flex-direction:column;   /* face melodiile una sub alta */
align-items:flex-start;
padding:0 10px;
transition:0.3s;
}

.history-panel.show{
max-height:150px;
padding:8px 10px;
}

.history-song{
font-size:12px;
font-weight:900;
margin:2px 0;
padding:3px 0;
white-space:nowrap;
border-bottom:1px solid var(--glow);
}
.history-song:last-child{
border-bottom:none;
}

input[type=range]{
width:200px;
appearance:none;
height:6px;
border-radius:3px;
background:var(--glow);
}

input[type=range]::-webkit-slider-thumb{
appearance:none;
width:14px;
height:14px;
border-radius:50%;
background:var(--glow);
box-shadow:0 0 10px var(--glow);
cursor:pointer;
margin-top:-4px;
}
#volValue{
margin-left:10px;
font-size:14px;
color:var(--glow);
font-weight:900;
}
#listenersBox{
display:inline-flex;
align-items:center;
gap:6px;
margin-left:15px;
font-size:14px;
font-weight:900;
color:var(--glow);
}

.liveDot{
width:8px;
height:8px;
border-radius:50%;
background:green;
box-shadow:0 0 8px green;
animation:liveBlink 1s infinite;
}

@keyframes liveBlink{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

.listenersUpdate{
animation:pop 0.3s;
}

@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}
#listeners{
margin-left:15px;
font-size:14px;
font-weight:900;
color:var(--glow);
}
.listenersUpdate{
animation: listenersPulse 0.4s;
}

@keyframes listenersPulse{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}
#eq{
opacity:0;
transition:0.3s;
}
.cover{
width:200px;
height:200px;
border-radius:50%;
border:6px solid var(--glow);
margin:auto;
overflow:hidden;
box-shadow:0 0 20px var(--glow);
transition:transform 0.05s linear, box-shadow 0.05s linear;
}

#clock{
margin-top:10px;
}

</style>
</head>

<body>

<div class="player">

<div class="cover">
<img id="cover" src="https://xatimg.com/image/oacvd5ltA14X.png">
</div>

<div class="eq" id="eq"></div>

<div>

<button onclick="playRadio()">PLAY</button>

<input id="volumeSlider" type="range" min="0" max="100" value="100" oninput="setVol(this.value)">
<span id="volValue">100%</span>

<button onclick="stopRadio()">STOP</button>

</div>

<div class="marquee" id="meta">Încărcare...</div>

<div id="clock"></div>

<div class="scroll-box">
<div class="scroll-text" id="scrollMessage">
Radio LaFamilia • Ofline • 
</div>
</div>
<div class="chroma-dots">

<div class="chroma-dot" onclick="setColor('#ff0000')"><span></span></div>
<div class="chroma-dot" onclick="setColor('#ff7b00')"><span></span></div>
<div class="chroma-dot" onclick="setColor('#ffee00')"><span></span></div>
<div class="chroma-dot" onclick="setColor('#00ff00')"><span></span></div>
<div class="chroma-dot" onclick="setColor('#00ffff')"><span></span></div>
<div class="chroma-dot" onclick="setColor('#0066ff')"><span></span></div>
<div class="chroma-dot" onclick="setColor('#8a2be2')"><span></span></div>
<div class="chroma-dot" onclick="setColor('#ff00ff')"><span></span></div>
<div class="chroma-dot" onclick="setColor('#ffffff')"><span></span></div>
<span id="listeners"> 🎧 .. ASCULTA</span>
</div>



<div class="history-btn">

<button onclick="toggleHistory()">HISTORY</button>

<div class="history-panel" id="historyPanel"></div>

</div>
</div>


<div class="cityline" id="cities"></div>

</div>


<audio id="radio" crossorigin="anonymous"></audio>
<script>/*  Stream  */ 
const stream = "aHR0cHM6Ly9yYWRpby5zb25pY3BhbmVsLnJvOjEwOTIyL3N0cmVhbQ=="
document.getElementById("radio").src = atob(stream)
</script>

<script>

const audio = document.getElementById("radio")
const meta = document.getElementById("meta")
const listenersBox = document.getElementById("listeners")

/* PLAY STOP */
function playRadio(){

audio.play().catch(e=>console.log(e))

document.getElementById("eq").style.opacity = 1

const bars=document.querySelectorAll(".bar")

bars.forEach(bar=>{
bar.style.animationPlayState="running"
})

}
function stopRadio(){

audio.pause()

document.getElementById("eq").style.opacity = 0

const bars=document.querySelectorAll(".bar")

bars.forEach(bar=>{
bar.style.animationPlayState="paused"
})

}

/* VOLUME */

function setVol(v){

audio.volume = v/100

const slider=document.getElementById("volumeSlider")

slider.style.background =
`linear-gradient(to right, var(--glow) ${v}%, white ${v}%)`

document.getElementById("volValue").innerText = v + "%"

const bars=document.querySelectorAll(".bar")

bars.forEach(bar=>{
bar.style.opacity = v/100
})

}

/* EQ BARS */

const eq=document.getElementById("eq")

for(let i=0;i<30;i++){

let b=document.createElement("div")
b.className="bar"
b.style.animationDuration=(Math.random()*0.5+0.2)+"s"
eq.appendChild(b)

}

/* CLOCK */

function clock(){

const now = new Date()

const time = now.toLocaleTimeString()

const date = now.toLocaleDateString("ro-RO",{
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
})
document.getElementById("clock").innerText = time + "  🎧  " + date

}

setInterval(clock,1000)

/* WEATHER */

async function getWeather(){

try{

const r=await fetch("https://ipapi.co/json/")
const d=await r.json()

const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${d.latitude}&longitude=${d.longitude}&current_weather=true`)

const wd=await w.json()

document.getElementById("weather").innerText =
d.city+" "+Math.round(wd.current_weather.temperature)+"°C"

addCity(d.city)

}catch(e){}

}

/* VISITORS */

let visitors=[]

function addCity(city){

if(!visitors.includes(city)){
visitors.push(city)
}

let text=""

visitors.forEach(c=>{
text+="📍 "+c.toUpperCase()+"   "
})

document.getElementById("cities").innerText=text

}

/* HISTORY */

let historySongs=[]

function toggleHistory(){

const panel=document.getElementById("historyPanel")

panel.classList.toggle("show")

renderHistory()

}

function renderHistory(){

const panel=document.getElementById("historyPanel")

panel.innerHTML=""

historySongs.slice(-5).reverse().forEach((song,index)=>{

let div=document.createElement("div")
div.className="history-song"
div.innerText=(index+1)+" . "+song

panel.appendChild(div)

})

}

/* COLOR CHANGE */

function setColor(color){
document.documentElement.style.setProperty('--glow', color)
}

/* META + LISTENERS */

let lastListeners = 0

async function getRadioData(){

try{

const r = await fetch("https://radio.sonicpanel.ro:10922/stats?sid=1&json=1")
const d = await r.json()

/* SONG */

if(d.songtitle){

let song = d.songtitle.toUpperCase()

meta.innerText = song

if(historySongs[historySongs.length-1] !== song){

historySongs.push(song)

if(historySongs.length>10) historySongs.shift()

}

}

/* LISTENERS */

let listeners = d.currentlisteners || 0

const box = document.getElementById("listeners")

if(listeners != lastListeners){

box.classList.remove("listenersUpdate")
void box.offsetWidth
box.classList.add("listenersUpdate")

}

box.innerText = " 🎧 " + listeners + " ASCULTA"

lastListeners = listeners

}catch(e){

console.log("radio error")

}

}

/* SCROLL MESSAGE */

document.getElementById("scrollMessage").innerText =
"Radio LaFamilia • HITURI NON STOP • LIVE 24/7"

/* INTERVALS */

setInterval(getRadioData,15000)

getRadioData()
getWeather()

let audioCtx
let analyser
let dataArray
let source
let eqRunning=false

function initEQ(){

if(audioCtx) return   // se creează doar o dată

audioCtx = new AudioContext()

source = audioCtx.createMediaElementSource(audio)

analyser = audioCtx.createAnalyser()
analyser.fftSize = 64

source.connect(analyser)
analyser.connect(audioCtx.destination)

dataArray = new Uint8Array(analyser.frequencyBinCount)

}

function animateEQ(){


if(!eqRunning) return

analyser.getByteFrequencyData(dataArray)

const bars=document.querySelectorAll(".bar")

bars.forEach((bar,i)=>{

let val=dataArray[i]/255

let h = 10 + val*70

bar.style.height=h+"px"

/* culoare constantă */
bar.style.opacity = 1

})
/* BASS PULSE PE COVER */

let bass = dataArray[2] / 255

let scale = 1 + bass * 300

const cover = document.querySelector(".cover")

cover.style.transform = `scale(${scale})`

cover.style.boxShadow = `0 0 ${20 + bass*120}px var(--glow)`

}


// --- PROTECT SCRIPT ---
const protectionMessage="Stop Copyright ByDesign";
document.addEventListener("contextmenu", e=>{e.preventDefault();alert(protectionMessage);});
document.addEventListener("selectstart", e=>{e.preventDefault();});
document.addEventListener("keydown", e=>{e.preventDefault();alert(protectionMessage);});
document.addEventListener("keyup", e=>{e.preventDefault();alert(protectionMessage);});
document.addEventListener("dragstart", e=>{e.preventDefault();});
document.addEventListener("copy", e=>{e.preventDefault();alert(protectionMessage);});
document.addEventListener("mousedown", e=>{if(e.button===1||e.button===2){e.preventDefault();alert(protectionMessage);}});
document.addEventListener("keydown", function(e) {

    // Ctrl + U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
    }

    // Ctrl + Shift + I (DevTools)
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
    }

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

});
</script>
</body>
</html>
